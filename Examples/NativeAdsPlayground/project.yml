name: NativeAdsPlayground
options:
  bundleIdPrefix: com.mahainc.NativeAdsPlayground
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

packages:
  MobileAdsClient:
    path: ../..

targets:
  NativeAdsPlayground:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - App
      - Sources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: NativeAds
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Google's iOS test app id — valid for using the test ad units in
        # NativeAdSlot.testAdUnitID (see project README for the full list).
        GADApplicationIdentifier: ca-app-pub-3940256099942544~1458002511
        # Required by ATT — explain to the user before request.
        NSUserTrackingUsageDescription: "Test app for Google AdMob native ad templates."
    dependencies:
      - package: MobileAdsClient
        product: MobileAdsClientUI
      - package: MobileAdsClient
        product: NativeAdClient
      - package: MobileAdsClient
        product: NativeAdClientLive
    settings:
      base:
        PRODUCT_NAME: NativeAdsPlayground
        PRODUCT_BUNDLE_IDENTIFIER: com.mahainc.NativeAdsPlayground
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ALWAYS_SEARCH_USER_PATHS: NO
